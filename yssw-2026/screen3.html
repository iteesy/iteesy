<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>You Speak So Well — Screen 3</title>
  <style>
    html { font-size: clamp(14px, 0.9vw, 18px); }
    body { background: #EDE4CD; margin: 0; }
    .container { width: 100%; }
    .row { display: flex; gap: clamp(1px, 0.08vw, 2px); padding: clamp(0px, 0.05vw, 1px) 0; justify-content: center; flex-wrap: nowrap; }
    .bar-xs { width: clamp(8px, 0.62vw, 12px); height: clamp(18px, 2.0vh, 22px); flex-shrink: 0; overflow: hidden; }
    .bar-s  { width: clamp(12px, 1.0vw, 20px); height: clamp(18px, 2.0vh, 22px); flex-shrink: 0; overflow: hidden; }
    .bar-m  { width: clamp(20px, 2.0vw, 40px); height: clamp(18px, 2.0vh, 22px); flex-shrink: 0; overflow: hidden; }
    .bar-l  { width: clamp(32px, 3.2vw, 64px); height: clamp(18px, 2.0vh, 22px); flex-shrink: 0; overflow: hidden; }
    .transparent { background: transparent; }

    /* ── Opaque bar base ── */
    .opaque {
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      isolation: isolate;
      border-radius: clamp(1px, 0.06vw, 1.5px);
      background-origin: border-box;
      background-clip: border-box;
      background-position: center center;
      background-repeat: no-repeat;
      will-change: transform, background-position, filter;
      transition: transform 110ms linear, background-position 110ms linear, filter 110ms linear;
      transform: translate3d(var(--x, 0px), var(--y, 0px), 0) rotate(var(--r, 0deg));
    }

    /* ROOTS — fuller fill, warmer melancholy */
    .opaque.state-root {
      background-color: #5A3A14;
      background-image:
        url('textures/soft edge 1.png'),
        url('textures/soft edge 2.png'),
        url('textures/soft edge 3.png');
      background-blend-mode: soft-light, lighten;
      background-size: 100% 100%, 100% 100%, 100% 100%;
      background-repeat: no-repeat, no-repeat, no-repeat;
      opacity: 1;
      box-shadow: inset 0 0 3px rgba(0, 0, 0, 0.18);
      filter: sepia(0.14) saturate(0.95) contrast(1.05) brightness(0.98);
    }

    /* FALLING — faded gold, texture as memory */
    .opaque.state-falling {
      background-color: #A68B5B;
      background-image:
        url('textures/halftone dot.png'),
        url('textures/soft dust.png');
      background-blend-mode: multiply, overlay;
      background-size: 60px 60px, 150px 150px;
      background-repeat: repeat;
      opacity: 0.72;
      box-shadow: none;
    }

    /* ── Flicker on bar-xs and bar-s opaque bars ──
       Opacity cycles between 0.72 (state-falling resting value) and 0.
       Duration and delay are overridden per-element by the JS below. */
    @keyframes flicker {
      /* Total cycle = 240 frames = 8000ms at 60fps.
         Quick flickers: 3–6 frames. Holds: 6–12 frames. Long rests: up to 20 frames.
         Pattern: on 5f → off 4f → on 10f → off 5f → on 3f → off 12f →
                  on 8f → off 6f → on 4f → off 20f → on 6f → off 8f →
                  on 3f → off 5f → on 10f → rest off */
      0%      { opacity: 0.72; } /* on  — 5f  (~167ms) */
      2.08%   { opacity: 0; }    /* off — 4f  (~133ms) */
      3.75%   { opacity: 0.72; } /* on  — 10f (~333ms) */
      7.92%   { opacity: 0; }    /* off — 5f  (~167ms) */
      10%     { opacity: 0.72; } /* on  — 3f  (~100ms) */
      11.25%  { opacity: 0; }    /* off — 12f (~400ms) */
      16.25%  { opacity: 0.72; } /* on  — 8f  (~267ms) */
      19.58%  { opacity: 0; }    /* off — 6f  (~200ms) */
      22.08%  { opacity: 0.72; } /* on  — 4f  (~133ms) */
      23.75%  { opacity: 0; }    /* off — 20f (~667ms) */
      32.08%  { opacity: 0.72; } /* on  — 6f  (~200ms) */
      34.58%  { opacity: 0; }    /* off — 8f  (~267ms) */
      37.92%  { opacity: 0.72; } /* on  — 3f  (~100ms) */
      39.17%  { opacity: 0; }    /* off — 5f  (~167ms) */
      41.25%  { opacity: 0.72; } /* on  — 10f (~333ms) */
      45.42%  { opacity: 0; }    /* long rest — holds off for remainder */
      100%    { opacity: 0; }
    }

    .bar-xs.opaque {
      animation: flicker 28000ms steps(1) infinite;
    }

    .bar-s.opaque {
      animation: flicker 32000ms steps(1) infinite;
    }

    @keyframes fade-out {
      0%   { opacity: 0.88; }
      60%  { opacity: 0.88; }
      100% { opacity: 0; }
    }

    /* ── Overlay effects ── */
    .overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    .overlay-grain {
      opacity: 0.08;
      mix-blend-mode: overlay;
      filter: url(#grain);
      background: #ffffff;
    }
    .overlay-scanlines {
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
    }
    .overlay-tint {
      background: rgba(180, 130, 60, 0.04);
    }

    .words-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    .word-bar {
      position: absolute;
      display: inline-block;
      font-family: 'Times New Roman', Times, serif;
      font-size: clamp(0.72rem, 0.78vw, 0.98rem);
      line-height: 1.08rem;
      white-space: nowrap;
      color: #4A2E0A;
      background-color: #A68B5B;
      background-image:
        url('textures/halftone dot.png'),
        url('textures/grain.png');
      background-blend-mode: soft-light;
      background-size: 120px 120px, 80px 80px;
      background-repeat: repeat, repeat;
      padding: 0 3px;
      border-radius: 1px;
      opacity: 0;
      overflow: hidden;
      clip-path: inset(0 100% 0 0);
      will-change: clip-path, opacity, width, transform, background-color, box-shadow, filter;
      transform: translate3d(var(--x, 0px), var(--y, 0px), 0) rotate(var(--r, 0deg));
      transition: opacity 200ms ease, transform 110ms linear, clip-path 220ms ease, background-color 220ms ease, box-shadow 220ms ease, filter 220ms ease;
    }

    .word-bar.is-active {
      clip-path: inset(0 0 0 0);
    }

    .word-bar.revealed {
      background-color: #EDE4CD !important;
      background-image: none !important;
      box-shadow: none !important;
      filter: none !important;
      clip-path: inset(0 0 0 0) !important;
      opacity: 1 !important;
      -webkit-text-stroke: 0.5px #4A2E0A;
    }

    .word-bar.source-hidden {
      opacity: 0 !important;
      clip-path: inset(0 100% 0 0) !important;
    }

    .row.no-animation .opaque {
      animation: none !important;
    }
  </style>

  <!-- SVG grain filter — hidden, referenced by .overlay-grain -->
  <svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute">
    <defs>
      <filter id="grain" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
        <feColorMatrix type="saturate" values="0" in="noise"/>
      </filter>
    </defs>
  </svg>
</head>

<script>
// Randomize background-position on all textured bars to prevent visible tiling.
// Runs once on load only — no ongoing cost.
document.querySelectorAll('.opaque').forEach(bar => {
  const x1 = Math.floor(Math.random() * 200);
  const y1 = Math.floor(Math.random() * 200);
  const x2 = Math.floor(Math.random() * 80);
  const y2 = Math.floor(Math.random() * 80);
  bar.style.backgroundPosition = `${x1}px ${y1}px, ${x2}px ${y2}px`;
});
</script>

<script>
// PHASE 3 — Flicker desync with vertical intensity.
// Bottom bars flicker faster and spend more time invisible.
// Runs once on load only.
(() => {
  // bar-xs flicker desync — random offset into shared 28000ms cycle, wide duration drift
  document.querySelectorAll('.bar-xs.opaque').forEach(bar => {
    const offset = (Math.random() * 28000).toFixed(0);
    bar.style.animationDelay = `-${offset}ms`;
    const duration = (24000 + Math.floor(Math.random() * 10000));
    bar.style.animationDuration = `${duration}ms`;
  });

  // bar-s flicker desync — slower base cycle (32000ms), wide duration drift
  document.querySelectorAll('.bar-s.opaque').forEach(bar => {
    const offset = (Math.random() * 32000).toFixed(0);
    bar.style.animationDelay = `-${offset}ms`;
    const duration = (28000 + Math.floor(Math.random() * 10000));
    bar.style.animationDuration = `${duration}ms`;
  });

  // bar-m fade-out desync
  document.querySelectorAll('.bar-m.opaque').forEach(bar => {
    const duration = (10 + Math.random() * 6).toFixed(2); // 10s–16s
    const delay = (Math.random() * 12).toFixed(2);
    bar.style.animationDuration = `${duration}s`;
    bar.style.animationDelay = `-${delay}s`;
  });
})();
</script>

<script>
// Jitter — inherited from screen2. Stacks on top of flicker/fade animations.
// Opacity is only touched on state-falling bars so flicker on bar-xs/bar-s is preserved.
const opaqueBars = Array.from(document.querySelectorAll('.opaque'));
const scanFrames = [
  { x: 0.0,   y: 0.0,   r: 0.0  },
  { x: 0.35,  y: -0.25, r: 0.06 },
  { x: -0.22, y: 0.18,  r: -0.05 },
  { x: 0.14,  y: 0.08,  r: 0.03 },
  { x: -0.12, y: -0.1,  r: -0.04 }
];

let scanFrame = 0;

function jitterBars() {
  scanFrame = (scanFrame + 1) % scanFrames.length;

  opaqueBars.forEach((bar, i) => {
    const f = scanFrames[(scanFrame + i) % scanFrames.length];
    const isFalling = bar.classList.contains('state-falling');
    const strength = isFalling ? 0.6 : 1.0;

    const x = f.x * strength;
    const y = f.y * strength;
    const r = f.r * strength;

    bar.style.setProperty('--x', `${x}px`);
    bar.style.setProperty('--y', `${y}px`);
    bar.style.setProperty('--r', `${r}deg`);

    const px = 50 + x * 2.25 + (isFalling ? 0.2 : 0);
    const py = 50 + y * 2.25 + (isFalling ? -0.1 : 0);
    bar.style.backgroundPosition = `${px}% ${py}%`;

    // Only nudge opacity on falling bars — flicker animation owns opacity on all others
    if (isFalling) {
      bar.style.opacity = (0.48 + Math.random() * 0.08).toFixed(3);
    }
  });
}

setInterval(jitterBars, 110);
jitterBars();
</script>

<script>
(() => {
  const words = Array.from(document.querySelectorAll('.word-bar'));
  const lines = [...new Set(words.map(w => Number(w.dataset.line)))].sort((a, b) => a - b);
  const lineMap = new Map(
    lines.map(line => [
      line,
      words
        .filter(w => Number(w.dataset.line) === line)
        .sort((a, b) => Number(a.dataset.order) - Number(b.dataset.order)),
    ])
  );

  const LINE_GAP_MS = 200;
  const CYCLE_GAP_MS = 400;
  const TIMING = {
    1: {
      revealMin: 46,
      revealMax: 70,
      revealPauseMin: 30,
      revealPauseMax: 48,
      wordGap: 80,
      butLeadInMs: 680,
      butRevealMultiplier: 1.8,
      holdMs: 1000,
      eraseMin: 28,
      eraseMax: 40,
      erasePauseMin: 18,
      erasePauseMax: 28,
      eraseGap: 34,
    },
    2: {
      revealMin: 220,
      revealMax: 320,
      revealPauseMin: 150,
      revealPauseMax: 220,
      wordGap: 420,
      holdMs: 2000,
      eraseMin: 140,
      eraseMax: 200,
      erasePauseMin: 100,
      erasePauseMax: 150,
      eraseGap: 120,
    },
  };
  const timeouts = [];

  function sleep(ms) {
    return new Promise(resolve => {
      const t = setTimeout(resolve, ms);
      timeouts.push(t);
    });
  }

  function clearAll() {
    timeouts.forEach(t => clearTimeout(t));
    timeouts.length = 0;
  }

  function resetWord(word) {
    word.classList.remove('is-active', 'revealed', 'source-hidden');
    word.style.transition = 'none';
    word.style.opacity = '0';
    word.style.clipPath = 'inset(0 100% 0 0)';
    word.style.width = '0px';
    word.style.backgroundColor = '';
    word.style.backgroundImage = '';
    word.style.boxShadow = '';
    word.style.filter = '';
    word.style.webkitTextStroke = '';
    void word.offsetWidth;
  }

  function resetAll() {
    words.forEach(resetWord);
  }

  function measureFullWidth(word) {
    if (!word.dataset.fullWidth) {
      const prevWidth = word.style.width;
      const prevOpacity = word.style.opacity;
      const prevClip = word.style.clipPath;
      word.style.width = 'auto';
      word.style.opacity = '0';
      word.style.clipPath = 'none';
      const width = Math.ceil(word.getBoundingClientRect().width) || word.scrollWidth || 1;
      word.dataset.fullWidth = String(width);
      word.style.width = prevWidth;
      word.style.opacity = prevOpacity;
      word.style.clipPath = prevClip;
    }
    return Number(word.dataset.fullWidth) || 1;
  }

  function chunkStops(text) {
    const trimmed = text.trim();
    if (!trimmed) return [1];

    // Keep contractions and apostrophe words together so "don't" doesn't type in pieces.
    if (trimmed.includes("'")) return [trimmed.length];

    const wordsInText = trimmed.split(/\s+/).filter(Boolean);
    if (wordsInText.length > 1) {
      const stops = [];
      let count = 0;
      wordsInText.forEach((piece, index) => {
        count += piece.length;
        stops.push(count);
        if (index < wordsInText.length - 1) count += 1;
      });
      return stops.length ? stops : [Math.max(trimmed.length, 1)];
    }

    const length = trimmed.length;
    if (length <= 4) return [length];

    const chunkCount = Math.min(5, Math.max(3, Math.ceil(length / 5)));
    const stops = [];
    let cursor = 0;
    for (let i = 0; i < chunkCount; i += 1) {
      const remaining = length - cursor;
      const chunksLeft = chunkCount - i;
      const minNext = 1;
      const maxNext = remaining - (chunksLeft - 1);
      let step = Math.ceil(remaining / chunksLeft);
      if (i !== chunkCount - 1) {
        const drift = Math.round((Math.random() - 0.5) * 2);
        step = Math.max(minNext, Math.min(maxNext, step + drift));
      } else {
        step = remaining;
      }
      cursor += step;
      stops.push(cursor);
    }
    stops[stops.length - 1] = length;
    return stops;
  }

  async function revealChunked(word, timing) {
    const fullWidth = measureFullWidth(word);
    const text = word.textContent.trim();
    const totalChars = Math.max(text.length, 1);
    const stops = chunkStops(text);

    word.classList.add('is-active', 'revealed');
    word.style.transition = 'none';
    word.style.opacity = '1';
    word.style.clipPath = 'inset(0 100% 0 0)';
    word.style.width = '0px';
    void word.offsetWidth;

    for (let i = 0; i < stops.length; i += 1) {
      const chars = stops[i];
      const targetWidth = Math.max(1, Math.round((fullWidth * chars) / totalChars));
      word.style.width = targetWidth + 'px';
      await sleep(timing.revealMin + Math.random() * (timing.revealMax - timing.revealMin));
      if (i < stops.length - 1 && Math.random() > 0.75) {
        await sleep(timing.revealPauseMin + Math.random() * (timing.revealPauseMax - timing.revealPauseMin));
      }
    }

    word.style.width = fullWidth + 'px';
    word.classList.remove('is-active');
  }

  async function eraseChunked(word, timing) {
    const fullWidth = measureFullWidth(word);
    const text = word.textContent.trim();
    const totalChars = Math.max(text.length, 1);
    const stops = chunkStops(text).reverse();

    word.classList.add('is-active');
    word.style.transition = 'none';
    word.style.opacity = '1';
    word.style.clipPath = 'inset(0 0 0 0)';

    for (let i = 0; i < stops.length; i += 1) {
      const chars = stops[i];
      const targetWidth = Math.max(1, Math.round((fullWidth * chars) / totalChars));
      word.style.width = targetWidth + 'px';
      await sleep(timing.eraseMin + Math.random() * (timing.eraseMax - timing.eraseMin));
      if (i < stops.length - 1 && Math.random() > 0.8) {
        await sleep(timing.erasePauseMin + Math.random() * (timing.erasePauseMax - timing.erasePauseMin));
      }
    }

    word.style.width = '0px';
    word.classList.remove('is-active', 'revealed');
    word.classList.add('source-hidden');
  }

  function timingForWord(word, timing) {
    const text = word.textContent.trim().toLowerCase();
    if (text === 'but') {
      return {
        ...timing,
        revealMin: timing.revealMin * (timing.butRevealMultiplier || 1.6),
        revealMax: timing.revealMax * (timing.butRevealMultiplier || 1.6),
        revealPauseMin: timing.revealPauseMin * 1.2,
        revealPauseMax: timing.revealPauseMax * 1.2,
        wordGap: timing.wordGap,
      };
    }
    return timing;
  }

  async function playLine(line) {
    const lineWords = lineMap.get(line) || [];
    const timing = TIMING[line] || TIMING[1];

    for (const word of lineWords) {
      const text = word.textContent.trim().toLowerCase();
      if (text === 'but' && timing.butLeadInMs) {
        await sleep(timing.butLeadInMs);
      }
      await revealChunked(word, timingForWord(word, timing));
      await sleep(text === 'but' ? Math.max(120, Math.round(timing.wordGap * 0.4)) : timing.wordGap);
    }

    await sleep(timing.holdMs);

    for (const word of [...lineWords].reverse()) {
      await eraseChunked(word, timing);
      await sleep(timing.eraseGap);
    }
  }

  async function runCycle() {
    while (true) {
      resetAll();
      clearAll();
      for (const line of lines) {
        await playLine(line);
        await sleep(LINE_GAP_MS);
      }
      await sleep(CYCLE_GAP_MS);
    }
  }

  words.forEach(measureFullWidth);
  resetAll();
  runCycle();
})();
</script>
