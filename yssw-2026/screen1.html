<style>

  .container { width: 100vw; max-width: 100vw; margin: 0 auto; }
  .row { display: flex; gap: clamp(1px, 0.14vw, 3px); padding: clamp(1px, 0.07vw, 2px) 0; justify-content: center; flex-wrap: nowrap; }
  .bar-xs { width: clamp(0.55rem, 0.85vw, 0.9rem); height: clamp(1rem, 2.1vh, 1.45rem); flex-shrink: 0; overflow: hidden; }
  .bar-s  { width: clamp(0.9rem, 1.4vw, 1.4rem); height: clamp(1rem, 2.1vh, 1.45rem); flex-shrink: 0; overflow: hidden; }
  .bar-m  { width: clamp(1.8rem, 2.8vw, 2.9rem); height: clamp(1rem, 2.1vh, 1.45rem); flex-shrink: 0; overflow: hidden; }
  .bar-l  { width: clamp(2.8rem, 4.4vw, 4.7rem); height: clamp(1rem, 2.1vh, 1.45rem); flex-shrink: 0; overflow: hidden; }
  .transparent { background: transparent; }

  /* ── Opaque bar base ── */
  .opaque {
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    isolation: isolate;
    border-radius: 0.07rem;
    background-origin: border-box;
    background-clip: border-box;
    background-position: center center;
    background-repeat: no-repeat;
    will-change: transform, background-position, filter;
    transition: transform 110ms linear, background-position 110ms linear, filter 110ms linear;
    transform: translate3d(var(--x, 0px), var(--y, 0px), 0) rotate(var(--r, 0deg));
  }

  /* ROOTS — fuller fill, warmer melancholy */
    .opaque.state-root {
      background-color: #5A3A14;
      background-image:
        url('textures/soft edge 1.png'),
        url('textures/soft edge 2.png'),
        url('textures/soft edge 3.png');
      background-blend-mode: soft-light, lighten;
      background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%;
      background-repeat: no-repeat, no-repeat, no-repeat, no-repeat;
      opacity: 1;
      box-shadow: inset 0 0 0.2rem rgba(0, 0, 0, 0.18);
      filter: sepia(0.14) saturate(0.95) contrast(1.05) brightness(0.98);
    }

  /* FALLING — mid pressure, ink dragging */
  .opaque.state-falling {
    background-color: #7A5C35;
    background-image:
      url('textures/halftone dot.png'),
      url('textures/grain.png');
    background-blend-mode: overlay, normal;
    background-size: 120px 120px, 80px 80px;
    background-repeat: repeat, repeat;
    opacity: 0.5;
    box-shadow: inset 0 0 0.2rem rgba(0,0,0,0.2);
  }

  /* ── Overlay effects ── */
  .overlay {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
  }
  .overlay-grain {
    opacity: 0.08;
    mix-blend-mode: overlay;
    filter: url(#grain);
    background: #ffffff;
  }
  .overlay-scanlines {
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
  }
  .overlay-tint {
    background: rgba(180, 130, 60, 0.04);
  }

  /* ── Root drift — state-falling bars ── */
  .opaque.state-falling.depth-far {
    --scale: 0.4;
  }
  .opaque.state-falling.depth-mid {
    --scale: 0.7;
  }
  .opaque.state-falling.depth-near {
    --scale: 1.0;
  }

  /* ── Wind animation — ASCII grass, Ghibli-style sway ── */
  /* ── Textile foliage layer ── */
  .textile-layer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 1;
  }

    mask-image: radial-gradient(ellipse at center, black 0%, black 20%, rgba(0,0,0,0.6) 45%, transparent 68%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 0%, black 20%, rgba(0,0,0,0.6) 45%, transparent 68%);
    opacity: 0.85;
    z-index: 1;
    pointer-events: none;
    animation: textile-drift 8s ease-in-out infinite, weave-drift 90s linear infinite;
  }

  @keyframes weave-drift {
    0%   { background-position: 0px 0px, 0px 0px, 0px 0px; }
    100% { background-position: 0px -34px, 34px 0px, 0px 0px; }
  }

  @keyframes textile-drift {
    0%   { transform: translateX(0px) translateY(0px); }
    25%  { transform: translateX(4px) translateY(-2px); }
    50%  { transform: translateX(-3px) translateY(1px); }

    will-change: clip-path, opacity, transform, background-color, box-shadow, filter;
    --tx: 0px;
    transform: translate3d(calc(var(--tx, 0px) + var(--x, 0px)), var(--y, 0px), 0);
    transition: opacity 240ms ease, transform 110ms linear, clip-path 240ms ease, background-color 240ms ease, box-shadow 240ms ease, filter 240ms linear;
  }

  .word-bar.is-active {
    clip-path: inset(0 0 0 0);
  }

  .word-bar.revealed {
    background-color: #EDE4CD !important;

    box-shadow: none !important;

<script>
// Preserve the gentle desync structure for falling bars.
document.querySelectorAll('.opaque.state-falling').forEach(bar => {
  const depthRoll = Math.random();
  const depth = depthRoll < 0.4 ? 'depth-far' : depthRoll < 0.75 ? 'depth-mid' : 'depth-near';
  bar.classList.add(depth);

  const scale = depth === 'depth-far' ? 0.4 : depth === 'depth-mid' ? 0.7 : 1.0;

  const durY = (9 + Math.random() * 7).toFixed(2);
  const durX = (durY * 1.3 + Math.random() * 3).toFixed(2);
  const delY = -(Math.random() * 10).toFixed(2);
  const delX = -(Math.random() * 10).toFixed(2);

  bar.style.setProperty('--dur-y', `${durY}s`);
  bar.style.setProperty('--dur-x', `${durX}s`);
  bar.style.setProperty('--del-y', `${delY}s`);
  bar.style.setProperty('--del-x', `${delX}s`);

  const yDist = (1.5 * scale).toFixed(2);
  const xDist = (0.8 * scale).toFixed(2);
  bar.style.setProperty('--y-dist', `${yDist}px`);
  bar.style.setProperty('--x-dist', `${xDist}px`);
});

// Root drift for opaque state-root
document.querySelectorAll('.opaque.state-root').forEach(bar => {
  const durY = (9 + Math.random() * 7).toFixed(2);
  const durX = (durY * 1.3 + Math.random() * 3).toFixed(2);
  const delY = -(Math.random() * 10).toFixed(2);
  const delX = -(Math.random() * 10).toFixed(2);
  bar.style.setProperty('--dur-y', `${durY}s`);
  bar.style.setProperty('--dur-x', `${durX}s`);
  bar.style.setProperty('--del-y', `${delY}s`);
  bar.style.setProperty('--del-x', `${delX}s`);
  bar.style.setProperty('--y-dist', '0.8px');
  bar.style.setProperty('--x-dist', '0.4px');

const WORD_LAYER = document.querySelector('.words-layer');
let opaqueBars = Array.from(document.querySelectorAll('.opaque'));

function syncOpaqueBars() {
  opaqueBars = Array.from(document.querySelectorAll('.opaque')).concat(
    Array.from(document.querySelectorAll('.word-bar'))
  );
}

const scanFrames = [
  { x: 0.0, y: 0.0, r: 0.0 },
  { x: 0.35, y: -0.25, r: 0.06 },
  { x: -0.22, y: 0.18, r: -0.05 },
  { x: 0.14, y: 0.08, r: 0.03 },
  { x: -0.12, y: -0.1, r: -0.04 }
];

let scanFrame = 0;

function jitterBars() {
  scanFrame = (scanFrame + 1) % scanFrames.length;

  opaqueBars.forEach((bar, i) => {
    if (bar.classList.contains('word-bar')) {
      bar.style.setProperty('--x', '0px');
      bar.style.setProperty('--y', '0px');
      bar.style.setProperty('--r', '0deg');
      return;
    }

    const f = scanFrames[(scanFrame + i) % scanFrames.length];
    const isFalling = bar.classList.contains('state-falling');
    const strength = isFalling ? 0.6 : 1.0;

    const x = f.x * strength;
    const y = f.y * strength;
    const r = f.r * strength;

    bar.style.setProperty('--x', `${x}px`);
    bar.style.setProperty('--y', `${y}px`);
    bar.style.setProperty('--r', `${r}deg`);

    const px = 50 + x * 2.25 + (isFalling ? 0.2 : 0);
    const py = 50 + y * 2.25 + (isFalling ? -0.1 : 0);
    bar.style.backgroundPosition = `${px}% ${py}%`;

    if (isFalling) {
      bar.style.opacity = (0.48 + Math.random() * 0.08).toFixed(3);
    } else {
      bar.style.opacity = '1';
    }
  });
}

setInterval(jitterBars, 110);
jitterBars();

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function chunkStops(text) {
  const trimmed = text.trim();
  if (!trimmed) return [1];

  const words = trimmed.split(/\s+/).filter(Boolean);
  if (words.length > 1) {
    const stops = [];
    let count = 0;
    words.forEach((word, index) => {
      count += word.length;
      stops.push(count);
      if (index < words.length - 1) count += 1;
    });
    return stops.length ? stops : [Math.max(trimmed.length, 1)];
  }

  const length = trimmed.length;
  if (length <= 6) return [length];

  const chunkCount = Math.min(5, Math.max(3, Math.ceil(length / 5)));
  const stops = [];
  let cursor = 0;

  for (let i = 0; i < chunkCount; i += 1) {
    const remaining = length - cursor;
    const chunksLeft = chunkCount - i;
    const minNext = 1;
    const maxNext = remaining - (chunksLeft - 1);
    let step = Math.ceil(remaining / chunksLeft);

    if (i === chunkCount - 1) {
      step = remaining;
    } else {
      const drift = Math.round((Math.random() - 0.5) * 2);
      step = Math.max(minNext, Math.min(maxNext, step + drift));
    }

    cursor += step;
    stops.push(cursor);
  }

  stops[stops.length - 1] = length;
  return stops;
}

function measureFullWidth(el) {
  if (!el.dataset.fullWidth) {
    const prevWidth = el.style.width;
    const prevOpacity = el.style.opacity;
    const prevClip = el.style.clipPath;

    el.style.width = 'auto';
    el.style.opacity = '0';
    el.style.clipPath = 'none';

    const measured = Math.ceil(el.getBoundingClientRect().width) || el.scrollWidth || 1;
    el.dataset.fullWidth = String(measured);

    el.style.width = prevWidth;
    el.style.opacity = prevOpacity;
    el.style.clipPath = prevClip;
  }

  return Number(el.dataset.fullWidth) || 1;
}

function setBarText(el, text) {
  el.textContent = text;
  delete el.dataset.fullWidth;
}

function resetBar(el) {
  el.classList.remove('is-active', 'revealed', 'source-hidden');
  el.style.transition = 'none';
  el.style.clipPath = 'inset(0 100% 0 0)';
  el.style.opacity = '0';
  el.style.width = '0px';
  el.style.backgroundColor = '';
  el.style.backgroundImage = '';
  el.style.boxShadow = '';
  el.style.filter = '';
  el.style.webkitTextStroke = '';
}

function buildPhrases() {
  WORD_LAYER.innerHTML = '';
  const allGroups = [];

  PHRASES.forEach((phrase, phraseIndex) => {
    const positions = phrase.placements;

    for (let instanceIndex = 0; instanceIndex < positions.length; instanceIndex += 1) {
      const pos = positions[instanceIndex];
      const group = document.createElement('div');
      group.className = 'phrase-instance';
      group.dataset.phraseIndex = String(phraseIndex);
      group.dataset.instanceIndex = String(instanceIndex);
      group.style.left = `${pos.left}vw`;
      group.style.top = `${pos.top}vh`;
      group.style.transform = positions.length === 1 ? 'translate(-50%, -50%)' : 'none';

      const il = document.createElement('div');
      il.className = 'word-bar word-line';
      il.dataset.line = 'il';
      setBarText(il, phrase.il);
      group.appendChild(il);

      WORD_LAYER.appendChild(group);
      allGroups.push(group);
    }
  });

  syncOpaqueBars();
  allGroups.forEach(group => {
    group.querySelectorAll('.word-bar').forEach(measureFullWidth);
    group.querySelectorAll('.word-bar').forEach(resetBar);
  });

  return allGroups;
}


async function revealChunked(el) {
  const text = el.textContent.trim();
  const totalChars = Math.max(text.length, 1);
  const stops = chunkStops(text);

  el.classList.remove('source-hidden');
  el.classList.add('is-active', 'revealed');
  el.style.transition = 'none';
  el.style.opacity = '1';
  el.style.clipPath = 'inset(0 100% 0 0)';
  el.style.width = '0px';
  void el.offsetWidth;

  for (let i = 0; i < stops.length; i += 1) {
    const chars = stops[i];
    const targetWidth = Math.max(1, Math.round((measureFullWidth(el) * chars) / totalChars));
    el.style.width = `${targetWidth}px`;
    await sleep(CHUNK_MIN_MS + Math.random() * (CHUNK_MAX_MS - CHUNK_MIN_MS));
    if (i < stops.length - 1 && Math.random() > 0.72) {
      await sleep(60 + Math.random() * 80);
    }
  }

  el.style.width = `${measureFullWidth(el)}px`;
  el.style.opacity = '1';
  el.classList.remove('is-active');
}

async function eraseChunked(el) {
  const fullWidth = measureFullWidth(el);
  const text = el.textContent.trim();
  const totalChars = Math.max(text.length, 1);
  const stops = chunkStops(text).reverse();

  el.classList.add('is-active');
  el.style.transition = 'none';
  el.style.opacity = '1';
  el.style.clipPath = 'inset(0 0 0 0)';

  for (let i = 0; i < stops.length; i += 1) {
    const chars = stops[i];
    const targetWidth = Math.max(1, Math.round((fullWidth * chars) / totalChars));
    el.style.width = `${targetWidth}px`;
    await sleep(ERASE_MIN_MS + Math.random() * (ERASE_MAX_MS - ERASE_MIN_MS));
    if (i < stops.length - 1 && Math.random() > 0.8) {
      await sleep(45 + Math.random() * 70);
    }
  }

  el.style.width = '0px';
  el.classList.remove('is-active', 'revealed');
  el.classList.add('source-hidden');
}

async function playPhrase(groups, phraseIndex, holdMs = IL_HOLD_MS) {
  const bars = groups.flatMap(group => Array.from(group.querySelectorAll('.word-bar')));

  bars.forEach(el => {
    setBarText(el, PHRASES[phraseIndex].il);
    resetBar(el);
  });

  await Promise.all(bars.map(revealChunked));
  await sleep(holdMs);
  await Promise.all(bars.map(eraseChunked));
}

async function playSequence() {
  while (true) {
    const groupsByPhrase = PHRASES.map((_, phraseIndex) =>
      Array.from(WORD_LAYER.querySelectorAll(`.phrase-instance[data-phrase-index="${phraseIndex}"]`))
    );

    for (let phraseIndex = 0; phraseIndex < PHRASES.length; phraseIndex += 1) {
      const isLast = phraseIndex === PHRASES.length - 1;
      await playPhrase(groupsByPhrase[phraseIndex], phraseIndex, isLast ? 1000 : IL_HOLD_MS);
      await sleep(LINE_GAP_MS);
    }

    await sleep(SET_GAP_MS);
    WORD_LAYER.innerHTML = '';
    syncOpaqueBars();
    buildPhrases();
  }
}

buildPhrases();
playSequence();
